general {
    hide_cursor = true
    immediate_render = true
}

background {
    color = rgba(0, 0, 0, 1.0)
}

label {
    text = cmd[update:1000] echo "$(date '+%-I:%M')"
    color = rgba(202, 211, 245, 1.0)
    font_size = 110
    font_family = JetBrainsMono Nerd Font
    position = 0, 160
    halign = center
    valign = center
}

label {
    text = cmd[update:60000] echo "$(date '+%A, %-d %B %Y')"
    color = rgba(147, 154, 183, 1.0)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, 60
    halign = center
    valign = center
}

input-field {
    size = 300, 55
    outline_thickness = 3
    dots_size = 0.2
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(137, 130, 196, 1.0)
    inner_color = rgba(30, 30, 46, 0.3)
    font_color = rgba(202, 211, 245, 1.0)
    check_color = rgba(166, 209, 137, 1.0)
    fail_color = rgba(231, 130, 132, 1.0)
    capslock_color = rgba(249, 226, 175, 1.0)
    fade_on_empty = false
    rounding = 10
    placeholder_text = <span foreground="##5b6078"><i>󰌾 Enter password...</i></span>
    fail_text = <i>$FAIL  ($ATTEMPTS)</i>
    hide_input = false
    position = 0, -60
    halign = center
    valign = center
}

label {
    text = Hi there, $USER
    color = rgba(147, 154, 183, 0.8)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 260
    halign = center
    valign = center
}

label {
    text = $LAYOUT[ga,de]
    color = rgba(137, 130, 196, 0.7)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 30, -30
    halign = left
    valign = bottom
}
